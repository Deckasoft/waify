# Wife mood-lifter stack. Reuses the OpenWA dev compose for the API + dashboard
# and adds two services of our own: `sender` (CLI/TUI, on-demand) and
# `scheduler` (Ofelia, fires `wife send` on a cron schedule).
#
# Usage:
#   docker compose up -d                         # API + dashboard + scheduler
#   docker compose run --rm sender init          # one-time seed
#   docker compose run --rm sender tui           # open the TUI
#   docker compose restart scheduler             # after editing schedule
#
# The host wrapper at bin/wife is a shortcut for `docker compose run --rm sender`.

include:
  - path: ../Deckasoft/OpenWA/docker-compose.dev.yml

services:
  # On-demand CLI/TUI container. Profile-gated so `docker compose up` does NOT
  # start it; use `docker compose run --rm sender ...` or the bin/wife wrapper.
  sender:
    build:
      context: .
    image: openwa-scripts-sender:latest
    container_name: wife-sender
    profiles: [tools]
    environment:
      - WAIFY_DATA_DIR=/data
    env_file:
      - .env
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true

  # Ofelia cron daemon. Reads data/ofelia.ini (generated by `wife schedule add`
  # or the TUI). Each job uses `job-run` to spawn a fresh sender container.
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: wife-scheduler
    command: daemon --config=/etc/ofelia/config.ini
    depends_on:
      - openwa
    volumes:
      - ./data/ofelia.ini:/etc/ofelia/config.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

# OpenWA's docker-compose.dev.yml renames the default network to `openwa-network`,
# so by leaving our services on the default network they share it with openwa-api.
# Declared external to silence the "exists but was not created for project" warning
# when the network was created by a prior OpenWA-only `docker compose up` run.
networks:
  default:
    name: openwa-network
    external: true
