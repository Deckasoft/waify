# Developer reference compose file.
# For end-user setup, run: waify setup
#
# Usage:
#   docker compose up -d             # start OpenWA API + scheduler
#   docker compose logs -f           # tail logs
#   docker compose down              # stop

services:
  openwa-api:
    image: ghcr.io/deckasoft/openwa:latest
    ports:
      - '2785:3000'
    environment:
      - NODE_ENV=production
    volumes:
      - openwa-data:/app/data
    restart: unless-stopped
    networks:
      - waify-network

  openwa-dashboard:
    image: ghcr.io/deckasoft/openwa:latest
    ports:
      - '2886:4000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - waify-network

  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - openwa-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${WAIFY_DATA_DIR:-~/.config/waify}/ofelia.ini:/etc/ofelia/config.ini:ro
    restart: unless-stopped
    networks:
      - waify-network

volumes:
  openwa-data:

networks:
  waify-network:
    name: waify-network
