name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Exchange OIDC token for npm publish token
        id: npm-oidc
        run: |
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r '.value')
          NPM_TOKEN=$(curl -fsSL -X POST \
            https://registry.npmjs.org/-/npm/v1/login/oidc \
            -H "Content-Type: application/json" \
            -d "{\"idToken\":\"${OIDC_TOKEN}\"}" | jq -r '.token')
          echo "::add-mask::${NPM_TOKEN}"
          echo "token=${NPM_TOKEN}" >> "$GITHUB_OUTPUT"
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-oidc.outputs.token }}
